name: ML Multi-Stage Pipeline

on:
  push:
    branches-ignore:
      - main

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc mlflow

    #   - name: Pull data with DVC

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train.py

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
      - name: Debug MLflow creation
        run: ls -R
        
      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
            name: mlruns-data
            path: ./mlruns

  deploy:
      runs-on: ubuntu-latest
      needs: validate
  
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
  
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.10'
  
        - name: Install dependencies
          run: pip install mlflow
  
        - name: Download model info
          uses: actions/download-artifact@v4
          with:
            name: model-info
  
        - name: Download MLflow runs
          uses: actions/download-artifact@v4
          with:
            name: mlruns-data
            path: .
  
        - name: Debug MLflow files
          run: ls -R mlruns
  
        - name: Set MLflow tracking URI
          run: echo "MLFLOW_TRACKING_URI=file:./mlruns" >> $GITHUB_ENV
  
        - name: Check accuracy threshold
          run: python check_threshold.py
  
        - name: Mock Docker build
          run: |
            echo "Building Docker image for Run ID: $(cat model_info.txt)"