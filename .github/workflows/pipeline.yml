name: ML Multi-Stage Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  linter:
    name: Gatekeeper - Code Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linter
        run: pip install flake8

      - name: Run Linter
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. Remove --exit-zero for strict enforcement.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  train:
    name: GPU-Accelerated Training
    needs: linter
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' && 
      contains(github.event.head_commit.message, '[run-train]')
    
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install torch torchvision mlflow

      - name: Train model
        id: train_step
        run: python train.py

      - name: Upload MLflow and Model Info
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: |
            mlflow.db
            model_info.txt
            mlruns/

      - name: Capture Error Logs
        if: failure()
        run: |
          echo "PIPELINE FAILURE REPORT" > error_logs.txt
          echo "Timestamp: $(date)" >> error_logs.txt
          echo "Branch: ${{ github.ref }}" >> error_logs.txt
          echo "Commit: ${{ github.sha }}" >> error_logs.txt
          echo "Check the GHA console output for Python Traceback." >> error_logs.txt

      - name: Upload Failure Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Resource Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."